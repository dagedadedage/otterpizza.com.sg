# Otter Pizza Nginx Configuration
# Canonical domain: otterpizza.com.sg (non-www)
# All other domains 301 redirect to canonical.

# =========================================================================
# Redirect: www.otterpizza.com.sg → otterpizza.com.sg
# =========================================================================
server {
    listen 443 ssl http2;
    server_name www.otterpizza.com.sg;

    # Temporary: using otterpizza.com cert until .com.sg cert is issued
    ssl_certificate /etc/letsencrypt/live/otterpizza.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/otterpizza.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://otterpizza.com.sg$request_uri;
}

# =========================================================================
# Redirect: otterpizza.com + www.otterpizza.com → otterpizza.com.sg
# =========================================================================
server {
    listen 443 ssl http2;
    server_name otterpizza.com www.otterpizza.com;

    ssl_certificate /etc/letsencrypt/live/otterpizza.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/otterpizza.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://otterpizza.com.sg$request_uri;
}

# =========================================================================
# Main canonical site: otterpizza.com.sg
# =========================================================================
server {
    listen 443 ssl http2;
    server_name otterpizza.com.sg;

    # Temporary: using otterpizza.com cert until .com.sg cert is issued
    ssl_certificate /etc/letsencrypt/live/otterpizza.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/otterpizza.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy to Next.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# =========================================================================
# HTTP → HTTPS for all domains
# =========================================================================
server {
    listen 80;
    server_name otterpizza.com www.otterpizza.com otterpizza.com.sg www.otterpizza.com.sg;
    return 301 https://otterpizza.com.sg$request_uri;
}
